<h2>Available Courses</h2>

@if (isLoading) {
  <p>Loading courses...</p>
} @else if (courses.length === 0) {
  <p>No courses available.</p>
} @else {
  @for (c of courses; track trackByCourseId($index, c)) {
    <app-course-card
      appHighlight="lightblue"
      [course]="c"
      [enrolled]="c.id === selectedCourseId"
      (enrollRequested)="onEnroll($event)">
    </app-course-card>
  }
}

@if (selectedCourseId) {
  <p>Selected course ID: {{ selectedCourseId }}</p>
}
