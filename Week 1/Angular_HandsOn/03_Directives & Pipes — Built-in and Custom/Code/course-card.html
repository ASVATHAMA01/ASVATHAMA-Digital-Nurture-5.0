<div class="card" [ngClass]="cardClasses" [ngStyle]="cardStyle">
  <h3>{{ course.name }}</h3>
  <p>{{ course.code }} — {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge passed">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge failed">Failed</span>
    <span *ngSwitchCase="'pending'" class="badge pending">Pending</span>
  </div>

  <button (click)="enrollRequested.emit(course.id)">Enroll</button>
  <button (click)="isExpanded = !isExpanded">
    {{ isExpanded ? 'Hide' : 'Show' }} Details
  </button>

  @if (isExpanded) {
    <div class="details">
      <p>ID: {{ course.id }} | Status: {{ course.gradeStatus }}</p>
    </div>
  }
</div>
